name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  VITE_SUPABASE_URL: https://placeholder.supabase.co
  VITE_SUPABASE_ANON_KEY: placeholder-anon-key
  VITE_API_URL: https://quantitech-backend-production.up.railway.app/api

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      # No test step: this repo has no test framework configured yet
      # (see risk register — zero test coverage on the PWA offline-sync path).
